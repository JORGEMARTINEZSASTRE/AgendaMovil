name: Modularizar formulario de servicios

on:
  push:
    branches:
      - modularizar-servicios-form-20260701

permissions:
  contents: write

jobs:
  modularizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: modularizar-servicios-form-20260701

      - name: Extraer modal de servicios a módulo
        run: |
          python <<'PY'
          from pathlib import Path

          index_path = Path('backend/public/index.html')
          module_dir = Path('backend/public/modules')
          module_path = module_dir / 'servicios-form.js'
          workflow_path = Path('.github/workflows/modularizar-servicios-form.yml')

          text = index_path.read_text(encoding='utf-8')

          start_marker = '''<!-- ═══════════════════════════════════════════════
     MODAL: NUEVO / EDITAR SERVICIO
════════════════════════════════════════════════ -->'''
          end_marker = '''<!-- ═══════════════════════════════════════════════
     MODAL: FICHA CLÍNICA
════════════════════════════════════════════════ -->'''

          start = text.find(start_marker)
          end = text.find(end_marker)
          if start == -1 or end == -1 or end <= start:
              raise SystemExit('No se pudo localizar el bloque del modal de servicios.')

          modal_html = text[start:end].rstrip()

          old_fields = '''      <div class="campo">
        <label for="serv-nombre">✂️ Nombre del servicio *</label>
        <input
          type="text"
          id="serv-nombre"
          placeholder="Ej: Depilación"
          required
        >
      </div>
      <!-- Precio del servicio -->
<div class="campo">
  <label for="serv-precio">💰 Precio ($)</label>
  <input
    type="number"
    id="serv-precio"
    min="0"
    step="50"
    placeholder="Ej: 1500"
  >
</div>
     <div class="campo">
  <label for="serv-categoria">📂 Categoría</label>
  <input
    type="text"
    id="serv-categoria"
    list="categorias-sugeridas"
    placeholder="Ej: Facial, Corporal, Depilación..."
    maxlength="100"
    autocomplete="off"
  >
  <datalist id="categorias-sugeridas"></datalist>
  <small style="font-size:11px;color:var(--gris);margin-top:4px;display:block">
    Escribí una nueva o elegí de la lista. Si lo dejás vacío se guarda como "General".
  </small>
</div>'''

          new_fields = '''      <div class="campo">
        <label for="serv-categoria">📂 Categoría</label>
        <input
          type="text"
          id="serv-categoria"
          list="categorias-sugeridas"
          placeholder="Ej: Depilación láser, Facial, Corporal..."
          maxlength="100"
          autocomplete="off"
        >
        <datalist id="categorias-sugeridas"></datalist>
        <small style="font-size:11px;color:var(--gris);margin-top:4px;display:block">
          Primero elegí la familia del servicio. Si lo dejás vacío se guarda como "General".
        </small>
      </div>

      <div class="campo">
        <label for="serv-nombre">✂️ Nombre del servicio *</label>
        <input
          type="text"
          id="serv-nombre"
          placeholder="Ej: Axilas, Cavado completo, Pierna entera..."
          required
        >
      </div>

      <!-- Precio del servicio -->
      <div class="campo">
        <label for="serv-precio">💰 Precio ($)</label>
        <input
          type="number"
          id="serv-precio"
          min="0"
          step="50"
          placeholder="Ej: 1500"
        >
      </div>'''

          if old_fields not in modal_html:
              raise SystemExit('No se encontró el bloque de campos esperado dentro del modal de servicios.')
          modal_html = modal_html.replace(old_fields, new_fields, 1)

          def js_template(s: str) -> str:
              return s.replace('\\', '\\\\').replace('`', '\\`').replace('${', '\\${')

          module_dir.mkdir(parents=True, exist_ok=True)
          module_path.write_text("""'use strict';

// Módulo UI: modal de alta/edición de servicios.
// Mantiene el HTML fuera de index.html para que AgendaMóvil sea más fácil de mantener.
(function cargarModalServicio() {
  const html = `%s`;
  const slot = document.getElementById('servicio-modal-slot');

  if (slot) {
    slot.outerHTML = html;
    return;
  }

  document.write(html);
})();
""" % js_template(modal_html), encoding='utf-8')

          placeholder = '''<!-- ═══════════════════════════════════════════════
     MODAL: NUEVO / EDITAR SERVICIO
     Cargado desde modules/servicios-form.js
════════════════════════════════════════════════ -->
<div id="servicio-modal-slot"></div>

'''
          text = text[:start] + placeholder + text[end:]

          if '<script src="modules/servicios-form.js"></script>' not in text:
              text = text.replace('<script src="api.js"></script>', '<script src="modules/servicios-form.js"></script>\n<script src="api.js"></script>', 1)

          index_path.write_text(text, encoding='utf-8')

          if workflow_path.exists():
              workflow_path.unlink()
          PY

      - name: Commit modularización
        run: |
          git config user.name "ChatGPT Codex Connector"
          git config user.email "actions@github.com"
          git add backend/public/index.html backend/public/modules/servicios-form.js .github/workflows/modularizar-servicios-form.yml
          git commit -m "refactor: modularizar formulario de servicios" || exit 0
          git push
